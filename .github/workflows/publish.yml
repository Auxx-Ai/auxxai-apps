name: Publish Apps

on:
  push:
    branches: [main]
    paths:
      - "apps/**"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.apps }}
      has_changes: ${{ steps.filter.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        name: Detect changed apps
        run: |
          if [ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="HEAD~1"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          CHANGED_FILES=$(git diff --name-only $BASE_SHA HEAD)

          VALID_APPS=()
          for dir in apps/*/; do
            APP_NAME=$(basename "$dir")
            if echo "$CHANGED_FILES" | grep -q "^apps/$APP_NAME/"; then
              VALID_APPS+=("$APP_NAME")
            fi
          done

          if [ ${#VALID_APPS[@]} -eq 0 ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "apps=[]" >> $GITHUB_OUTPUT
          else
            JSON=$(printf '%s\n' "${VALID_APPS[@]}" | jq -R . | jq -s -c .)
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "apps=$JSON" >> $GITHUB_OUTPUT
            echo "Publishing apps: $JSON"
          fi

  publish:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.apps) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: pnpm install --frozen-lockfile

      - name: Authenticate with Auxx
        working-directory: apps/${{ matrix.app }}
        run: pnpm exec auxx login --token "${{ secrets.AUXX_DEPLOY_TOKEN }}"

      - name: Build and publish
        working-directory: apps/${{ matrix.app }}
        run: pnpm exec auxx version create
        env:
          AUXX_ENV: production
          AUXX_API_URL: ${{ secrets.AUXX_API_URL }}
