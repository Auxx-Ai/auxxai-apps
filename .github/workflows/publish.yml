name: Publish Apps

# Manual only — publishing is deliberately decoupled from merge to main. Apps
# may land features ahead of the production SDK/API supporting them, so a human
# triggers this once the platform side is ready (Actions tab → Run workflow).
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Test mode (check-all): type-check + bundle every app, no upload/publish'
        type: boolean
        default: false

# No changed-path filter: the server skips no-op releases (identical bundles +
# catalog return the existing deployment unchanged), so publishing every app is
# cheap. push-all exits non-zero if any app fails → red CI.
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          # No root pnpm-lock.yaml (apps manage deps individually); v5 enables
          # package-manager caching by default, which then errors on the missing lockfile.
          package-manager-cache: false

      # Real publish needs the key; dry-run (check-all) only builds locally, no auth.
      - name: Require AUXX_API_KEY
        if: ${{ !inputs.dry_run }}
        run: |
          if [ -z "${{ secrets.AUXX_API_KEY }}" ]; then
            echo "::error::AUXX_API_KEY secret is not set — mint a developer key in the build portal and add it as a repo secret."
            exit 1
          fi

      # Apps pin @auxx/sdk via a local `link:` path that doesn't exist in CI.
      # Rewrite each to the published `latest` and install per-app deps so
      # `npx auxx` resolves inside every app dir (push-all/check-all shell out per app).
      - name: Resolve @auxx/sdk and install app deps
        run: |
          for dir in apps/*/; do
            app=$(basename "$dir")
            [ "$app" = "__template" ] || [ "$app" = "test" ] && continue
            [ -f "$dir/package.json" ] || continue
            node -e "
              const fs = require('fs');
              const p = '$dir/package.json';
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              if (pkg.dependencies?.['@auxx/sdk']?.startsWith('link:')) {
                pkg.dependencies['@auxx/sdk'] = 'latest';
                fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
              }
            "
            (cd "$dir" && pnpm install --no-frozen-lockfile)
          done

      # Root deps (tsx, for scripts/push-all.ts)
      - name: Install root deps
        run: pnpm install --no-frozen-lockfile

      - name: Publish (or test) all apps
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Test mode — running check-all (no upload/publish)"
            pnpm check-all
          else
            pnpm push-all
          fi
        env:
          AUXX_ENV: production
          AUXX_API_URL: ${{ secrets.AUXX_API_URL }}
          AUXX_API_KEY: ${{ secrets.AUXX_API_KEY }}
